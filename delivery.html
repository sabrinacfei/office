<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AMBASSADOR 國賓影城｜快遞提醒</title><link rel="stylesheet" href="css/visitor.css?v=20260622-7"><link rel="stylesheet" href="css/delivery.css?v=20260622-6"><link rel="stylesheet" href="css/kiosk-animations.css?v=20260624-1"></head>
<body><div class="kiosk-stage"><div class="kiosk-screen"><div class="visitor-canvas delivery-canvas">
  <header class="visitor-header"><button class="back-button" id="backButton" type="button"><span>‹</span> 返回首頁</button><div class="page-title"><svg viewBox="0 0 48 48"><path d="m7 15 17-9 17 9-17 9Z"/><path d="M7 15v19l17 9 17-9V15M24 24v19"/></svg><div><strong>快遞到貨通知</strong><small>DELIVERY NOTICE</small></div></div><div class="header-time"><span></span><strong id="headerTime">14:32</strong></div></header>
  <img class="delivery-background-character" src="images/Popcorn-removebg-preview.png" alt="" aria-hidden="true"><main class="delivery-main"><form class="delivery-form" id="deliveryForm" novalidate>
    <div class="delivery-heading"><div class="parcel-mark"><img src="images/05C28A9D-ED39-481C-B56F-055E66D03E9A-removebg-preview.png" alt="爆米花快遞員"></div><div><h1>填寫快遞資訊</h1><p>通知收件人前，請確認以下資料。</p></div><div class="delivery-heading-side"><span>必填欄位</span></div></div>
    <div class="delivery-grid"><label class="delivery-field"><span>收件人姓名</span><div><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-6 3.5-9 8-9s7 3 8 9"/></svg><input id="receiverName" type="text" placeholder="請輸入收件人姓名" autocomplete="name"></div><small></small></label><label class="delivery-field"><span>聯絡電話</span><div><svg viewBox="0 0 24 24"><path d="M5 3c3-1 5 4 3 6l-1 1c2 4 4 6 8 8l1-1c2-2 7 0 6 3-1 3-4 4-7 3C8 20 4 16 1 9 0 6 2 4 5 3Z"/></svg><input id="receiverPhone" type="tel" inputmode="numeric" maxlength="10" placeholder="09 開頭，共 10 碼"><b id="deliveryDigitCount">0 / 10</b></div><small></small></label></div>
    <fieldset><legend>是否需要本人簽收？</legend><div class="signature-options"><button class="selected" type="button" data-value="需要本人簽收"><strong>✓ 需要本人簽收</strong><span>由收件人親自確認</span></button><button type="button" data-value="無需本人簽收"><strong>× 無需本人簽收</strong><span>可由櫃檯代收</span></button></div></fieldset>
    <fieldset><legend>貨品分類</legend><div class="parcel-options"><button type="button" data-value="冷藏品"><i class="cold">❄</i><strong>冷藏品</strong><span>需冷藏保存</span></button><button class="selected" type="button" data-value="一般貨品"><i>⬡</i><strong>一般貨品</strong><span>標準包裹</span></button><button type="button" data-value="大型貨品"><i class="large">▣</i><strong>大型貨品</strong><span>體積或重量較大</span></button></div></fieldset>
    <div class="delivery-actions"><button id="clearButton" type="button">清除重填</button><button type="submit">送出通知 <span>›</span></button></div>
  </form></main>
  <section class="review-layer" id="reviewLayer" aria-hidden="true"><div class="review-card"><span class="review-kicker">PLEASE CONFIRM</span><h2>確認快遞資訊</h2><p>請確認資料正確後再送出通知。</p><dl><div><dt>收件人</dt><dd id="reviewName"></dd></div><div><dt>聯絡電話</dt><dd id="reviewPhone"></dd></div><div><dt>簽收方式</dt><dd id="reviewSignature"></dd></div><div><dt>貨品分類</dt><dd id="reviewParcel"></dd></div></dl><div class="review-actions"><button id="reviewEdit" type="button">不正確，返回編輯</button><button id="reviewSubmit" type="button">資料正確，送出通知</button></div></div></section>
  <section class="success-layer" id="successLayer" aria-hidden="true"><div class="success-card"><div class="success-check"><svg viewBox="0 0 48 48"><path d="m13 25 8 8 15-18"/></svg></div><span class="success-kicker">NOTICE SENT</span><h2>快遞通知已送出</h2><p>已通知 <strong id="successName"></strong><br>請等待收件人前來領取。</p><div class="auto-return"><span id="autoReturnSeconds">10</span> 秒後自動返回首頁</div><button id="successBack" type="button">返回首頁</button></div></section>
</div></div></div><script src="js/delivery.js?v=20260622-1"></script></body></html>
