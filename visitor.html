<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AMBASSADOR 國賓影城｜訪客登記</title>
  <link rel="stylesheet" href="css/visitor.css?v=20260624-3">
  <link rel="stylesheet" href="css/visitor-tune.css?v=20260624-1">
  <link rel="stylesheet" href="css/kiosk-animations.css?v=20260624-1">
</head>
<body>
  <div class="kiosk-stage"><div class="kiosk-screen"><div class="visitor-canvas">
    <header class="visitor-header">
      <button class="back-button" id="backButton" type="button"><span>‹</span> 返回首頁</button>
      <div class="page-title"><svg viewBox="0 0 48 48"><circle cx="24" cy="15" r="8"/><path d="M10 40c1-9 6-14 14-14s13 5 14 14"/></svg><div><strong>訪客登記</strong><small>VISITOR REGISTRATION</small></div></div>
      <div class="header-time"><span></span><strong id="headerTime">14:25</strong></div>
    </header>
    <main class="visitor-main">
      <section class="intro-panel">
        <img src="assets/ambassador-logo.png" alt="AMBASSADOR 國賓影城" class="mini-logo">
        <img 
          id="visitorPeopleArt"
          class="intro-mascot welcome-art" 
          src="images/665E7F6A-CB9A-4AB7-9894-05CBA6BECF9C.png" 
          alt="Welcome 歡迎訪客"
        >
        <h1>歡迎蒞臨</h1>
        <p>請填寫訪客資料，送出後將通知<br>接待人員協助您入場。</p>
        <div class="privacy-note"><svg viewBox="0 0 24 24"><path d="M12 21s8-4 8-11V5l-8-3-8 3v5c0 7 8 11 8 11Z"/><path d="m8 11 3 3 5-6"/></svg><span>資料僅用於本次訪客登記</span></div>
      </section>
      <form class="visitor-form" id="visitorForm" novalidate>
        <div class="form-heading"><div><span class="step">01</span><strong>填寫訪客資料</strong></div><small><i></i> 所有欄位皆為必填</small></div>
        <fieldset class="people-field"><legend>來訪人數</legend><div class="people-options" id="peopleOptions"><button class="selected" type="button" data-value="1">1</button><button type="button" data-value="2">2</button><button type="button" data-value="3">3</button><button type="button" data-value="4">4</button><button type="button" data-value="5">5</button><button type="button" data-value="6+">6+</button></div></fieldset>
        <label class="input-group"><span>訪客姓名</span><div class="input-shell"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-6 3.5-9 8-9s7 3 8 9"/></svg><input id="visitorName" type="text" placeholder="請輸入訪客姓名" autocomplete="name"></div><small class="error"></small></label>
        <label class="input-group"><span>聯絡電話</span><div class="input-shell"><svg viewBox="0 0 24 24"><path d="M5 3c3-1 5 4 3 6l-1 1c2 4 4 6 8 8l1-1c2-2 7 0 6 3-1 3-4 4-7 3C8 20 4 16 1 9 0 6 2 4 5 3Z"/></svg><input id="visitorPhone" type="tel" inputmode="numeric" maxlength="10" placeholder="09 開頭，共 10 碼" autocomplete="tel"><b class="digit-count" id="digitCount">0 / 10</b></div><small class="error"></small></label>
        <label class="input-group"><span>公司／單位名稱</span><div class="input-shell"><svg viewBox="0 0 24 24"><path d="M4 21V6h10v15M14 11h6v10M8 10h2M8 14h2M8 18h2M17 15h1M17 18h1"/></svg><input id="visitorCompany" type="text" placeholder="請輸入公司或單位名稱" autocomplete="organization"></div><small class="error"></small></label>
        <div class="form-actions"><button class="clear-button" id="clearButton" type="button">清除重填</button><button class="submit-button" type="submit">確認送出 <span>›</span></button></div>
      </form>
    </main>
    <section class="review-layer" id="reviewLayer" aria-hidden="true"><div class="review-card"><span class="review-kicker">PLEASE CONFIRM</span><h2>確認訪客資料</h2><p>送出後將通知接待人員，請確認以下資訊。</p><dl><div><dt>來訪人數</dt><dd id="reviewPeople"></dd></div><div><dt>訪客姓名</dt><dd id="reviewName"></dd></div><div><dt>聯絡電話</dt><dd id="reviewPhone"></dd></div><div><dt>公司／單位</dt><dd id="reviewCompany"></dd></div></dl><div class="review-actions"><button id="reviewEdit" type="button">不正確，返回編輯</button><button id="reviewSubmit" type="button">資料正確，確認送出</button></div></div></section>
    <section class="success-layer" id="successLayer" aria-hidden="true"><div class="success-card"><div class="success-check"><svg viewBox="0 0 48 48"><path d="m13 25 8 8 15-18"/></svg></div><span class="success-kicker">REGISTRATION COMPLETE</span><h2>訪客登記完成</h2><p><strong id="successName"></strong>，您的資料已送出<br>接待人員將儘快與您聯繫。</p><div class="visitor-ticket"><span>來訪人數</span><strong id="successPeople">1 人</strong><i></i><span>登記時間</span><strong id="successTime">14:25</strong></div><div class="auto-return"><span id="autoReturnSeconds">10</span> 秒後自動返回首頁</div><button id="successBack" type="button">返回首頁</button></div></section>
  </div></div></div>
  <script src="js/visitor.js"></script>
</body>
</html>
