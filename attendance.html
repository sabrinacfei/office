<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AMBASSADOR 國賓影城｜上下班打卡</title>
  <link rel="stylesheet" href="css/visitor.css?v=20260624-1">
  <link rel="stylesheet" href="css/attendance.css?v=20260624-2">
  <link rel="stylesheet" href="css/kiosk-animations.css?v=20260624-1">
</head>
<body>
  <div class="kiosk-stage"><div class="kiosk-screen"><div class="visitor-canvas attendance-canvas">
    <header class="visitor-header">
      <button class="back-button" id="backButton" type="button"><span>‹</span> 返回首頁</button>
      <div class="page-title"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="16"/><path d="M24 14v11h8"/></svg><div><strong>上下班打卡</strong><small>ATTENDANCE CLOCK</small></div></div>
      <div class="header-time"><span></span><strong id="headerTime">14:25</strong></div>
    </header>
    <main class="attendance-main">
      <section class="attendance-hero">
        <img class="attendance-logo" src="assets/ambassador-logo.png" alt="AMBASSADOR 國賓影城">
        <div class="clock-orb"><svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="31"/><path d="M40 18v25h18"/></svg></div>
        <p class="attendance-date" id="attendanceDate">2026 / 06 / 24　星期三</p>
        <h1 id="attendanceTime">14:25</h1>
        <p>請選擇上班或下班，輸入員工號後完成打卡。</p>
        <img class="attendance-mascot" src="images/Popcorn3-removebg-preview-removebg-preview.png" alt="爆米花角色">
      </section>
      <section class="attendance-panel">
        <div class="mode-switch" id="modeSwitch">
          <button class="selected in" type="button" data-mode="上班打卡"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="16"/><path d="M24 14v11h8"/></svg><strong>上班打卡</strong><span>Clock In</span></button>
          <button class="out" type="button" data-mode="下班打卡"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="16"/><path d="M24 14v11h8"/></svg><strong>下班打卡</strong><span>Clock Out</span></button>
        </div>
        <label class="attendance-input"><span>員工號</span><input id="employeeId" type="text" inputmode="numeric" maxlength="4" placeholder="請輸入員工號"><small id="employeeError"></small></label>
        <div class="keypad" id="keypad">
          <button type="button">1</button><button type="button">2</button><button type="button">3</button>
          <button type="button">4</button><button type="button">5</button><button type="button">6</button>
          <button type="button">7</button><button type="button">8</button><button type="button">9</button>
          <button type="button" data-action="clear">清除</button><button type="button">0</button><button type="button" data-action="delete">⌫</button>
        </div>
        <button class="attendance-submit" id="attendanceSubmit" type="button">確認打卡 <span>›</span></button>
      </section>
    </main>
    <section class="review-layer" id="reviewLayer" aria-hidden="true"><div class="review-card attendance-review"><span class="review-kicker">PLEASE CONFIRM</span><h2>確認打卡資料</h2><p>請確認本次打卡狀態與員工資料。</p><dl><div><dt>打卡類型</dt><dd id="reviewMode"></dd></div><div><dt>員工</dt><dd id="reviewEmployeeName"></dd></div><div><dt>員工號</dt><dd id="reviewEmployee"></dd></div><div><dt>打卡時間</dt><dd id="reviewTime"></dd></div></dl><div class="review-actions"><button id="reviewEdit" type="button">不正確，返回編輯</button><button id="reviewSubmit" type="button">資料正確，完成打卡</button></div></div></section>
    <section class="success-layer" id="successLayer" aria-hidden="true">
      <div class="success-card attendance-success">
        <img class="attendance-success-mascot" id="successMascot" src="images/clocking＿work.png" alt="爆米花角色">
        <div class="success-check"><svg viewBox="0 0 48 48"><path d="m13 25 8 8 15-18"/></svg></div>
        <span class="success-kicker" id="successKicker">CLOCK COMPLETE</span>
        <h2 id="successTitle">上班打卡完成</h2>
        <p id="successMessage">本次打卡已記錄。</p>
        <div class="employee-profile-pill"><span>員工</span><strong id="successEmployeeName">—</strong><small id="successEmployeeRole">—</small></div>
        <div class="visitor-ticket">
          <span>打卡時間</span><strong id="successTime">14:25</strong><i></i>
          <span>狀態</span><strong id="successMode">已完成</strong><i></i>
          <span>班別</span><strong id="successShift">—</strong>
        </div>
        <section class="mood-section" id="moodSection" hidden>
          <div class="mood-copy"><span>今日心情</span><strong id="moodLabel">平淡</strong><small>拉動滑桿，留下今天的下班心情。</small></div>
          <div class="mood-display"><img id="moodImage" src="images/emotionless.png" alt="今日心情"></div>
          <div class="mood-control">
            <input id="moodRange" type="range" min="0" max="3" step="1" value="1" aria-label="今日心情">
            <div class="mood-labels"><span>開心</span><span>平淡</span><span>難過</span><span>生氣</span></div>
          </div>
          <div class="next-shift-card"><span>下次上班時間</span><strong id="nextShiftTime">—</strong></div>
        </section>
        <div class="auto-return"><span id="autoReturnSeconds">10</span> 秒後自動返回首頁</div>
        <button id="successBack" type="button">返回首頁</button>
      </div>
    </section>
  </div></div></div>
  <script src="js/attendance.js?v=20260624-2"></script>
</body>
</html>
